<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تحميل التطبيق — CodeError</title>
  <meta name="description" content="حمّل التطبيق مباشرة">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="download-page">

  <nav class="site-nav">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="CodeError">
    </a>
  </nav>

  <main class="download-main">
    <div class="download-card" id="projectCard">
      <p class="dash-hint">بيتم التحميل...</p>
    </div>
  </main>

  <footer>
    <a href="index.html" class="back-home"><i><svg viewBox="0 0 24 24"><path d="M4 12h15"/><path d="M13 6l6 6-6 6"/></svg></i> الرجوع لكل التطبيقات</a>
    <br><br>
    <span class="brand-inline">Code<span>Error</span></span>
  </footer>

<script>
const id = new URLSearchParams(location.search).get("id");
const card = document.getElementById("projectCard");

fetch("projects.json")
  .then(r => r.json())
  .then(projects => {
    const p = projects.find(x => x.id === id);
    if (!p) {
      card.innerHTML = `
        <p class="dash-hint">التطبيق ده مش موجود أو اتشال. تقدر ترجع لكل التطبيقات من الرابط تحت.</p>
      `;
      return;
    }
    document.title = p.name + " — CodeError";
    card.innerHTML = `
      <div class="app-icon-wrap">
        <img src="${p.icon}" alt="${p.name}"
             onerror="this.parentElement.innerHTML='&lt;div class=&quot;app-icon-placeholder&quot;&gt;&lt;i&gt;&lt;svg viewBox=&quot;0 0 24 24&quot;&gt;&lt;rect x=&quot;7.5&quot; y=&quot;2.5&quot; width=&quot;9&quot; height=&quot;19&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;&lt;path d=&quot;M11 18h2&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/i&gt;&lt;/div&gt;'">
      </div>
      <div class="app-name">${p.name}</div>
      <div class="app-meta"><span>لأجهزة أندرويد</span><span>ملف APK</span></div>
      <a href="${p.apk}" class="btn-download" download>
        <i><svg viewBox="0 0 24 24"><path d="M12 4v10"/><path d="M7.5 10.5L12 15l4.5-4.5"/><path d="M5 19h14"/></svg></i>
        تحميل التطبيق
      </a>
      <div class="safety-note">
        <i><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 11v5"/><circle cx="12" cy="8" r="1" fill="currentColor" stroke="none"/></svg></i>
        <span>أثناء التثبيت قد يظهر لك تنبيه (الملف ضار)، هذا إجراء طبيعي من نظام أندرويد لأن التطبيق يتم تحميله برابط مباشر وليس من المتجر. التطبيق آمن 100% ومطور بواسطة CodeError.</span>
      </div>
    `;
  })
  .catch(() => {
    card.innerHTML = `<p class="dash-hint">تعذر تحميل بيانات التطبيق.</p>`;
  });
</script>

</body>
</html>
