<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر CodeError</title>
  <meta name="description" content="تطبيقات موثوقة من تطوير CodeError">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="CodeError">
    </a>
  </nav>

  <section class="hero store-hero">
    <div class="hero-glow"></div>
    <div class="hero-badge"><i><svg viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6l7-3z"/></svg></i> تطبيقات آمنة وموثوقة</div>
    <h1>متجر <span>CodeError</span></h1>
    <p class="lead">كل التطبيقات اللي طورناها في مكان واحد. اختار التطبيق اللي يهمك وحمّله مباشرة.</p>
  </section>

  <section class="store-grid-section">
    <div class="store-grid" id="storeGrid">
      <p class="dash-hint" id="storeEmpty">بيتم تحميل التطبيقات...</p>
    </div>
  </section>

  <footer>
    <span class="brand-inline">Code<span>Error</span></span>
    <br>
    جميع الحقوق محفوظة © 2026
  </footer>

<script>
fetch("projects.json")
  .then(r => r.json())
  .then(projects => {
    const grid = document.getElementById("storeGrid");
    if (!projects.length) {
      document.getElementById("storeEmpty").textContent = "لسه مفيش تطبيقات مضافة.";
      return;
    }
    grid.innerHTML = "";
    projects.forEach(p => {
      const a = document.createElement("a");
      a.href = `project.html?id=${encodeURIComponent(p.id)}`;
      a.className = "store-card";
      a.innerHTML = `
        <div class="store-card-icon">
          <img src="${p.icon}" alt="${p.name}" onerror="this.parentElement.innerHTML='<i><svg viewBox=&quot;0 0 24 24&quot;><rect x=&quot;7.5&quot; y=&quot;2.5&quot; width=&quot;9&quot; height=&quot;19&quot; rx=&quot;2&quot;></rect><path d=&quot;M11 18h2&quot;></path></svg></i>'">
        </div>
        <div class="store-card-body">
          <h3>${p.name}</h3>
          <p>${p.tagline || ""}</p>
        </div>
      `;
      grid.appendChild(a);
    });
  })
  .catch(() => {
    document.getElementById("storeEmpty").textContent = "تعذر تحميل قائمة التطبيقات.";
  });
</script>

</body>
</html>
